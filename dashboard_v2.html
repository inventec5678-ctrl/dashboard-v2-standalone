<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加密貨幣量化交易平台 v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0D1117;
            --bg-secondary: #161B22;
            --bg-tertiary: #21262D;
            --bg-card: #1C2128;
            --border-color: #30363D;
            --text-primary: #E6EDF3;
            --text-secondary: #8B949E;
            --text-muted: #6E7681;
            --accent-blue: #58A6FF;
            --accent-green: #3FB950;
            --accent-red: #F85149;
            --accent-yellow: #D29922;
            --accent-purple: #A371F7;
            --accent-orange: #F97316;
            --accent-cyan: #39D0D8;
            --shadow-card: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-hover: 0 4px 16px rgba(0,0,0,0.4);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 14px; }
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        @keyframes slideIn { from { transform:translateX(20px); opacity:0; } to { transform:translateX(0); opacity:1; } }
        @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
/* ── Main ── */
        .topbar {
            position: sticky; top: 0; z-index: 50;
            background: rgba(13,17,23,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 24px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .topbar-title { font-size: 16px; font-weight: 600; }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .update-badge {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; color: var(--text-secondary);
            padding: 5px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
        }
        .update-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-green); }
        .update-badge.stale .dot { background: var(--accent-yellow); }
        .update-badge.loading .dot { animation: pulse 1s infinite; }

        .page { padding: var(--space-lg); max-width: 1400px; margin: 0 auto; }

        /* ── Section Title ── */
        .section-title {
            font-size: 12px; font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 2px; text-transform: uppercase;
            margin-bottom: var(--space-md);
            display: flex; align-items: center; gap: var(--space-sm);
        }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }
        .section { margin-bottom: var(--space-xl); }

        /* ── Strategy Consensus Bar ── */
        /* ── Consensus Bar ── */
        .consensus-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            overflow: hidden;
            margin-bottom: var(--space-lg);
        }
        .cons-body.is-contents { display: block; }
        .cons-row {
            border-bottom: 1px solid var(--border-color);
        }
        .cons-row:last-child { border-bottom: none; }
        .cons-row-header {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 16px;
            background: var(--bg-tertiary);
        }
        .cons-row-icon { font-size: 16px; }
        .cons-row-label { font-size: 12px; font-weight: 700; color: var(--text-primary); }
        .cons-row-bias { font-size: 11px; font-weight: 800; letter-spacing: 1px; }
        .cons-row-bias.s { color: #ff6b6b; }
        .cons-row-bias.l { color: #69f0ae; }
        .cons-row-bias.n { color: #ffab00; }
        .cons-row-body {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
        }
        @media (max-width: 600px) { .cons-row-body { grid-template-columns: repeat(2, 1fr); } }
        .cons-stat { padding: 10px 14px; border-right: 1px solid var(--border-color); }
        .cons-stat:last-child { border-right: none; }
        .cons-stat-label { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
        .cons-stat-value { font-size: 15px; font-weight: 700; font-family: var(--font-mono); }
        .cons-stat-value.s { color: #ff6b6b; }
        .cons-stat-value.l { color: #69f0ae; }
        .cons-stat-value.n { color: #ffab00; }
        .cons-stat-value.c { color: var(--accent-cyan); }
        .cons-stat-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
        .cons-wr-bar { height: 3px; background: var(--bg-tertiary); border-radius: 2px; margin-top: 5px; overflow: hidden; }
        .cons-wr-fill { height: 100%; border-radius: 2px; }
        .cons-wr-fill.s { background: linear-gradient(90deg,#da3633,#ff6b6b); }
        .cons-wr-fill.l { background: linear-gradient(90deg,#238636,#69f0ae); }
        .cons-wr-fill.n { background: linear-gradient(90deg,#9e6a03,#ffab00); }
        .cons-pills { display: flex; gap: 4px; flex-wrap: wrap; }
        .cons-pill { font-size: 10px; padding: 2px 7px; border-radius: 8px; font-weight: 700; }
        .cons-pill.s { background: rgba(248,81,73,0.2); color: #ff6b6b; }
        .cons-pill.l { background: rgba(63,185,80,0.2); color: #69f0ae; }
        .cons-pill.n { background: rgba(255,255,255,0.1); color: var(--text-muted); }

        /* ── Strategy Ranking ── */
        .rank-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .rank-toolbar {
            display: flex; align-items: center; gap: 6px;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }
        .rank-sort-btn {
            font-size: 11px; font-weight: 600;
            padding: 4px 10px; border-radius: 6px;
            border: 1px solid var(--border-color);
            background: transparent; color: var(--text-muted);
            cursor: pointer; transition: all 0.15s;
        }
        .rank-sort-btn:hover { color: var(--text-primary); border-color: var(--accent-blue); }
        .rank-sort-btn.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
        .rank-table-wrap { overflow-x: auto; }
        .rank-table {
            width: 100%; border-collapse: collapse;
            font-size: 12px;
        }
        .rank-table thead { background: var(--bg-tertiary); }
        .rank-table th {
            padding: 8px 12px; text-align: left;
            font-size: 10px; font-weight: 700;
            color: var(--text-muted); letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap; border-bottom: 1px solid var(--border-color);
        }
        .rank-table th.sortable { cursor: pointer; user-select: none; }
        .rank-table th.sortable:hover { color: var(--text-primary); }
        .rank-table td {
            padding: 8px 12px; border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }
        .rank-table tr:last-child td { border-bottom: none; }
        .rank-table tbody tr { cursor: pointer; transition: background 0.15s; }
        .rank-table tbody tr:hover { background: rgba(88,166,255,0.06); }
        .rank-table tbody tr.selected { background: rgba(88,166,255,0.12); }
        .rank-table .rank-num { font-weight: 700; color: var(--text-muted); width: 28px; text-align: center; }
        .rank-table .rank-1 .rank-num { color: #ffd700; }
        .rank-table .rank-2 .rank-num { color: #c0c0c0; }
        .rank-table .rank-3 .rank-num { color: #cd7f32; }
        .rank-name-cell { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .rank-name { font-weight: 600; font-size: 12px; }
        .rank-tf { font-size: 10px; color: var(--text-muted); }
        .rank-badge {
            font-size: 10px; font-weight: 700; padding: 2px 7px;
            border-radius: 10px; white-space: nowrap;
        }
        .rank-badge.short { background: rgba(248,81,73,0.2); color: #ff6b6b; }
        .rank-badge.long { background: rgba(63,185,80,0.2); color: #69f0ae; }
        .rank-badge.neutral { background: rgba(255,255,255,0.1); color: var(--text-muted); }
        .rank-pct { font-weight: 700; font-family: var(--font-mono); font-size: 12px; }
        .rank-pct.high { color: var(--accent-green); }
        .rank-pct.mid { color: var(--accent-yellow); }
        .rank-pct.low { color: var(--accent-red); }
        .rank-metric { font-weight: 600; font-family: var(--font-mono); font-size: 12px; }
        .rank-metric.good { color: var(--accent-green); }
        .rank-metric.warn { color: var(--accent-yellow); }
        .rank-metric.bad { color: var(--accent-red); }
        .rank-entry { font-weight: 600; font-family: var(--font-mono); font-size: 12px; color: var(--accent-cyan); }
        .rank-conditions { font-size: 10px; line-height: 1.4; min-width: 180px; max-width: 220px; }
        .rank-conditions .cond-item { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
        .rank-conditions .cond-item .dot { font-size: 11px; }
        .rank-conditions .cond-item.satisfied { color: #3FB950; }
        .rank-conditions .cond-item.unsatisfied { color: #555; }
        .rank-conditions .cond-item.empty { color: var(--text-muted); font-size: 10px; }
        .cond-badge { font-size:11px; padding:2px 6px; border-radius:4px; font-weight:600; }
        .cond-badge.green { background:rgba(63,185,80,0.2); color:#3FB950; }
        .cond-badge.yellow { background:rgba(234,179,8,0.2); color:#EAB308; }
        .cond-badge.gray { background:rgba(100,100,100,0.2); color:#8B949E; }
        .modal-conditions { margin-top: 12px; }
        .cond-item { display:flex; align-items:center; gap:8px; padding:8px; border-radius:6px; margin-bottom:6px; }

        /* ── Strategy Detail Modal ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            width: 560px; max-width: 95vw; max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; background: var(--bg-card); z-index: 1;
        }
        .modal-title { font-size: 15px; font-weight: 700; }
        .modal-close {
            background: var(--bg-tertiary); border: 1px solid var(--border-color);
            color: var(--text-muted); width: 28px; height: 28px;
            border-radius: 6px; cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-close:hover { color: var(--text-primary); }
        .modal-body { padding: 16px 20px; }
        .modal-section { margin-bottom: 16px; }
        .modal-section-title { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border-color); }
        .modal-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .modal-metric { background: var(--bg-tertiary); border-radius: var(--radius-sm); padding: 8px 10px; text-align: center; }
        .modal-metric-label { font-size: 10px; color: var(--text-muted); margin-bottom: 3px; }
        .modal-metric-value { font-size: 15px; font-weight: 700; font-family: var(--font-mono); }
        .modal-metric-value.good { color: var(--accent-green); }
        .modal-metric-value.warn { color: var(--accent-yellow); }
        .modal-metric-value.bad { color: var(--accent-red); }
        .modal-prices { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .modal-price-card { background: var(--bg-tertiary); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
        .modal-price-label { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
        .modal-price-value { font-size: 16px; font-weight: 700; font-family: var(--font-mono); }
        .modal-price-value.entry { color: var(--accent-cyan); }
        .modal-price-value.tp { color: var(--accent-green); }
        .modal-price-value.sl { color: var(--accent-red); }
        .modal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
        .modal-tag { font-size: 10px; padding: 3px 8px; border-radius: 6px; background: rgba(88,166,255,0.15); color: var(--accent-blue); font-weight: 600; }
        .modal-reason { font-size: 12px; color: var(--text-secondary); line-height: 1.6; background: var(--bg-tertiary); padding: 10px 12px; border-radius: var(--radius-sm); border-left: 3px solid var(--accent-blue); }

        /* ── K-Line Chart ── */
        .chart-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .chart-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: var(--space-md);
            border-bottom: 1px solid var(--border-color);
        }
        .chart-sym { font-size: 16px; font-weight: 700; }
        .chart-price { font-size: 20px; font-weight: 700; margin-top: 2px; }
        .chart-price.up { color: var(--accent-green); }
        .chart-price.dn { color: var(--accent-red); }
        .chart-meta { display: flex; gap: 16px; font-size: 11px; color: var(--text-muted); }
        .chart-meta span { font-family: var(--font-mono); }
        .chart-meta span.up { color: var(--accent-green); }
        .chart-meta span.dn { color: var(--accent-red); }
        .chart-tf { display: flex; gap: 4px; }
        .tf-btn {
            font-size: 11px; padding: 4px 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        .tf-btn.active, .tf-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); border-color: var(--accent-blue); }
        #chart-container { height: 380px; }

        /* ── Anomaly Panels ── */
        .anomaly-panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
        }
        @media (max-width: 900px) { .anomaly-panels { grid-template-columns: 1fr; } }

        .anomaly-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .anomaly-panel-header {
            display: flex; align-items: center; gap: var(--space-sm);
            padding: var(--space-md);
            border-bottom: 1px solid var(--border-color);
        }
        .anomaly-panel-title { font-size: 13px; font-weight: 700; flex: 1; }
        .anomaly-status-light {
            display: flex; align-items: center; gap: 5px;
            font-size: 11px; font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .anomaly-status-light.normal { background: rgba(63,185,80,0.15); color: var(--accent-green); }
        .anomaly-status-light.warning { background: rgba(210,153,34,0.15); color: var(--accent-yellow); }
        .anomaly-status-light.critical { background: rgba(248,81,73,0.15); color: var(--accent-red); }
        .anomaly-status-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .anomaly-status-dot.normal { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
        .anomaly-status-dot.warning { background: var(--accent-yellow); box-shadow: 0 0 6px var(--accent-yellow); animation: pulse 1.5s infinite; }
        .anomaly-status-dot.critical { background: var(--accent-red); box-shadow: 0 0 6px var(--accent-red); animation: pulse 0.8s infinite; }

        .anomaly-count-badge {
            font-size: 10px; font-weight: 700;
            padding: 2px 7px; border-radius: 10px;
            background: rgba(255,255,255,0.08);
            color: var(--text-muted);
        }
        .anomaly-count-badge.has-anom { background: rgba(248,81,73,0.2); color: #ff6b6b; }

        .anomaly-list { padding: var(--space-sm); max-height: 300px; overflow-y: auto; }
        .anomaly-list::-webkit-scrollbar { width: 4px; }
        .anomaly-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

        .anomaly-row {
            display: flex; align-items: center; gap: var(--space-sm);
            padding: 8px 10px; border-radius: var(--radius-sm);
            transition: background 0.15s;
        }
        .anomaly-row:hover { background: var(--bg-tertiary); }
        .anomaly-row-icon { font-size: 16px; width: 20px; text-align: center; }
        .anomaly-row-sym { font-size: 13px; font-weight: 700; width: 50px; }
        .anomaly-row-ratio {
            font-size: 12px; font-weight: 600; font-family: var(--font-mono);
            flex: 1; text-align: right;
        }
        .anomaly-row-ratio.normal { color: var(--text-muted); }
        .anomaly-row-ratio.warning { color: var(--accent-yellow); }
        .anomaly-row-ratio.critical { color: var(--accent-red); }
        .anomaly-row-ratio.good { color: var(--accent-green); }
        .anomaly-row-detail { font-size: 10px; color: var(--text-muted); width: 70px; text-align: right; }
        .anomaly-empty {
            text-align: center; padding: 24px;
            color: var(--text-muted); font-size: 12px;
        }
        .anomaly-empty-icon { font-size: 28px; margin-bottom: 6px; }
        .anomaly-panel-loading {
            text-align: center; padding: 40px;
            color: var(--text-muted); font-size: 12px;
        }

        /* ── Loading ── */
        .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
        .loading::after { content: '...'; animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* ── Market Toggle ── */
        .market-toggle { display: flex; gap: 2px; background: var(--bg-tertiary); border-radius: 6px; padding: 2px; }

        /* ── Market Sentiment ── */
        .sentiment-bar { display: flex; gap: var(--space-sm); margin-bottom: var(--space-lg); flex-wrap: wrap; }
        .sentiment-chip { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; transition: all 0.2s; }
        .sentiment-chip .chip-label { color: var(--text-muted); font-weight: 500; }
        .sentiment-chip .chip-val { font-family: var(--font-mono); }
        .sentiment-chip.bull { border-color: rgba(63,185,80,0.4); background: rgba(63,185,80,0.08); }
        .sentiment-chip.bull .chip-val { color: var(--accent-green); }
        .sentiment-chip.bear { border-color: rgba(248,81,73,0.4); background: rgba(248,81,73,0.08); }
        .sentiment-chip.bear .chip-val { color: var(--accent-red); }
        .sentiment-chip.neutral { border-color: var(--border-color); }
        .sentiment-chip.neutral .chip-val { color: var(--text-primary); }
        .sentiment-chip .regime-dot { width: 7px; height: 7px; border-radius: 50%; }
        .sentiment-chip .regime-dot.bull { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
        .sentiment-chip .regime-dot.bear { background: var(--accent-red); box-shadow: 0 0 6px var(--accent-red); }
        .rank-table tbody tr.row-long { background: rgba(63,185,80,0.04); }
        .rank-table tbody tr.row-long:hover { background: rgba(63,185,80,0.10); }
        .rank-table tbody tr.row-short { background: rgba(248,81,73,0.04); }
        .rank-table tbody tr.row-short:hover { background: rgba(248,81,73,0.10); }
        .modal-price-card { position: relative; }
        .copy-btn { position: absolute; top: 6px; right: 6px; background: none; border: 1px solid var(--border-color); color: var(--text-muted); font-size: 9px; padding: 1px 5px; border-radius: 4px; cursor: pointer; transition: all 0.15s; font-family: var(--font-mono); }
        .copy-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .copy-btn.copied { color: var(--accent-green); border-color: var(--accent-green); }
        .modal-chart-btns { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .modal-chart-btn { font-size: 10px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border-color); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
        .modal-chart-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .modal-chart-btn.active { background: rgba(88,166,255,0.15); color: var(--accent-blue); border-color: var(--accent-blue); }

        /* ── Responsive ── */

<script>
function clearPriceLines() {
    if (window._priceLines) {
        window._priceLines.forEach(function(line) {
            if (line && typeof line.remove === 'function') line.remove();
        });
        window._priceLines = [];
    }
    // Also remove MA/RSI overlay series
    if (window._maLineSeries) { window._maLineSeries.remove(); window._maLineSeries = null; }
    if (window._rsiLineSeries) { window._rsiLineSeries.remove(); window._rsiLineSeries = null; }
    window._activePriceLines = {};
    // Hide clear button if no price lines remain
    var clearBtn = document.getElementById('clear-chart-lines-btn');
    if (clearBtn) clearBtn.style.display = 'none';
}

function togglePriceLine(type) {
    var s = window._activeModalStrategy || window._currentStrategy;
    if (!s) return;
    // Clear previous lines of this type
    if (window._priceLines) {
        window._priceLines.forEach(function(line) {
            if (line && typeof line.remove === 'function') line.remove();
        });
        window._priceLines = [];
    }
    window._priceLines = [];

    var color, title;
    var price = null;

    if (type === 'entry') {
        price = s.entry_price;
        color = '#58A6FF';
        title = '📍 Entry';
    } else if (type === 'tp') {
        price = s.take_profit;
        color = '#3FB950';
        title = '🎯 TP';
    } else if (type === 'sl') {
        price = s.stop_loss;
        color = '#F85149';
        title = '🛡 SL';
    } else if (type === 'ma') {
        // MA overlay: compute from close prices
        var period = (s.parameters && (s.parameters.ma_period || s.parameters.ma_slow)) || 20;
        title = 'MA' + period;
        color = '#D29922';
        if (candleSeries && window._chartCandleData) {
            var closes = window._chartCandleData.map(function(d) { return d.close; });
            if (closes.length >= period) {
                var maData = [];
                for (var i = period - 1; i < closes.length; i++) {
                    var sum = 0;
                    for (var j = 0; j < period; j++) sum += closes[i - j];
                    maData.push({ time: window._chartCandleData[i].time, value: sum / period });
                }
                if (window._maLineSeries) {
                    window._maLineSeries.remove();
                    window._maLineSeries = null;
                }
                window._maLineSeries = chart.addLineSeries({
                    color: color,
                    lineWidth: 2,
                    priceLineVisible: false,
                    lastValueVisible: true,
                    title: title,
                });
                window._maLineSeries.setData(maData);
                window._priceLines.push(window._maLineSeries);
                window._activePriceLines['ma'] = title;
                if (chart) chart.timeScale().fitContent();
                var clearBtn = document.getElementById('clear-chart-lines-btn');
                if (clearBtn) clearBtn.style.display = 'inline';
                return;
            }
        }

        return;
    } else if (type === 'rsi') {
        // RSI overlay: compute from close prices
        title = 'RSI14';
        color = '#A371F7';
        if (candleSeries && window._chartCandleData) {
            var closes = window._chartCandleData.map(function(d) { return d.close; });
            if (closes.length >= 14) {
                var rsiData = [];
                var gains = [], losses = [];
                for (var i = 1; i < closes.length; i++) {
                    var diff = closes[i] - closes[i-1];
                    gains.push(diff > 0 ? diff : 0);
                    losses.push(diff < 0 ? -diff : 0);
                }
                for (var i = 13; i < gains.length; i++) {
                    var avgGain = 0, avgLoss = 0;
                    for (var j = i-13; j <= i; j++) { avgGain += gains[j]; avgLoss += losses[j]; }
                    avgGain /= 14; avgLoss /= 14;
                    var rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
                    var rsiVal = 100 - (100 / (1 + rs));
                    rsiData.push({ time: window._chartCandleData[i+1].time, value: rsiVal });
                }
                if (window._rsiLineSeries) {
                    window._rsiLineSeries.remove();
                    window._rsiLineSeries = null;
                }
                // RSI needs its own pane — create price line markers as approximation
                window._rsiLineSeries = chart.addLineSeries({
                    color: color,
                    lineWidth: 2,
                    priceLineVisible: false,
                    lastValueVisible: true,
                    title: title,
                });
                window._rsiLineSeries.setData(rsiData);
                window._priceLines.push(window._rsiLineSeries);
                window._activePriceLines['rsi'] = title;
                if (chart) chart.timeScale().fitContent();
                var clearBtn = document.getElementById('clear-chart-lines-btn');
                if (clearBtn) clearBtn.style.display = 'inline';
                return;
            }
        }

        return;
    } else {
        return;
    }

    if (!price) {
        return;
    }

    // Draw horizontal price line on main chart
    if (candleSeries) {
        var lineStyle = LightweightCharts.LineStyle.Dashed;
        var line = candleSeries.createPriceLine({
            price: price,
            color: color,
            lineWidth: 1,
            lineStyle: lineStyle,
            axisLabelVisible: true,
            title: title
        });
        window._priceLines.push(line);
        window._activePriceLines[type] = price;
    }

    // Show clear button
    var clearBtn = document.getElementById('clear-chart-lines-btn');
    if (clearBtn) clearBtn.style.display = 'inline';

    if (chart) chart.timeScale().fitContent();
}
</script>

// ── Utilities ──
function fmt(n, decimals) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    decimals = decimals !== undefined ? decimals : 2;
    return Number(n).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtPrice(n) {
    if (!n) return '—';
    return '$' + fmt(n);
}

function copyPrice(btn, val) {
    if (!val || val === '—' || val === 'null' || val === 'undefined') return;
    navigator.clipboard.writeText(val.toString()).then(function() {
        btn.classList.add('copied');
        var orig = btn.textContent;
        btn.textContent = '已複製';
        setTimeout(function() { btn.classList.remove('copied'); btn.textContent = orig; }, 1500);
    }).catch(function() {});
}

function fmtPct(n) {
    if (!n && n !== 0) return '—';
    return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}

function fmtNum(n) {
    if (!n) return '—';
    if (Math.abs(n) >= 1e9) return (n/1e9).toFixed(2) + 'B';
    if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(2) + 'M';
    if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(2) + 'K';
    return n.toFixed(2);
}

// ── Update Badge ──
function updateBadge(status, text) {
    var badge = document.getElementById('update-badge');
    var timeEl = document.getElementById('update-time');
    badge.className = 'update-badge ' + (status || '');
    timeEl.textContent = text || '';
}

function formatTime(date) {
    if (!date) return '--';
    return date.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}



function setChip(id, val, type) {
    var el = document.getElementById(id);
    if (!el) return;
    el.className = 'sentiment-chip ' + type;
    var v = document.getElementById(id + '-val');
    if (v) v.textContent = val;
}

// ── TWSE / Market Switching ──

        loadTWSEQuote(currentTWSEStock);

        // Also clear consensus and sentiment since they're crypto-specific

        if (consBody) consBody.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px">台股模式，暫無策略資料</div>';
        // Reset sentiment chips
        var sentimentBar = document.getElementById('sentiment-bar');

                chip.className = 'sentiment-chip neutral';
            });

        document.getElementById('sc-ma50-val').textContent = '—';
        document.getElementById('sc-ma200-val').textContent = '—';

function loadTWSEChart(sym, tf) {
    currentMarket = 'TWSE';
    var url = API_BASE + '/twse/klines/' + sym + '?interval=' + tf + '&limit=300';
    fetch(url)
        .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
        .then(function(data) {
            if (!data || !data.length) return;
            var cdata = data.map(function(d) {
                return { time: d.time, open: parseFloat(d.open), high: parseFloat(d.high), low: parseFloat(d.low), close: parseFloat(d.close) };
            });
            // Use existing TWSE chart or create new one
            if (!window.twseChart) {
                var container = document.getElementById('chart-container-twse');
                if (!container) return;
                window.twseChart = LightweightCharts.createChart(container, {
                    width: container.clientWidth, height: 380,
                    layout: { background: { color: '#161B22' }, textColor: '#8B949E' },
                    grid: { vertLines: { color: '#1C2128' }, horzLines: { color: '#1C2128' } },
                    rightPriceScale: { borderColor: '#30363D' },
                    timeScale: { borderColor: '#30363D', timeVisible: true },
                });
                window.twseCandleSeries = window.twseChart.addCandlestickSeries({
                    upColor: '#3FB950', downColor: '#F85149',
                    borderUpColor: '#3FB950', borderDownColor: '#F85149',
                    wickUpColor: '#3FB950', wickDownColor: '#F85149',
                });
                window.addEventListener('resize', function() {
                    if (window.twseChart) {
                        var c = document.getElementById('chart-container-twse');
                        if (c) window.twseChart.applyOptions({ width: c.clientWidth });
                    }
                });
            }
            if (window.twseCandleSeries) window.twseCandleSeries.setData(cdata);
            if (window.twseChart) window.twseChart.timeScale().fitContent();
            // Update price display
            var last = cdata[cdata.length - 1];
            if (last) {
                var priceEl = document.getElementById('twse-price-v2');
                if (priceEl) { priceEl.textContent = last.close.toLocaleString(); priceEl.className = 'chart-price'; }
                var chgEl = document.getElementById('twse-change-v2');
                if (chgEl && cdata.length > 1) {
                    var pct = ((last.close - cdata[0].open) / cdata[0].open * 100);
                    chgEl.textContent = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
                    chgEl.className = pct >= 0 ? 'up' : 'dn';
                }
            }
        })
        .catch(function(e) {
            console.error('TWSE chart error', e);
        });
}

function computeConsensus(strategies) {
    var matched = strategies.filter(function(s){ return s.match_pct > 0; });
    var fullMatched = strategies.filter(function(s){ return s.match_pct === 100; });

    var short = 0, long = 0, neutral = 0, wrSum = 0, wrCount = 0;
    matched.forEach(function(s) {
        if (s.direction === 'SHORT') short++;
        else if (s.direction === 'LONG') long++;
        else neutral++;
        wrSum += (s.win_rate || 0);
        wrCount++;
    });

    var bias = short > long ? 's' : long > short ? 'l' : 'n';
    var biasLabel = short > long ? 'SHORT' : long > short ? 'LONG' : 'NEUTRAL';
    var biasIcon = short > long ? '🔴' : long > short ? '🟢' : '⚖';
    var wr = wrCount > 0 ? Math.round(wrSum / wrCount) : 0;
    var wrColor = wr >= 60 ? 'l' : wr >= 40 ? 'n' : 's';
    var total = short + long + neutral;

    var entries = fullMatched.map(function(s){ return s.entry_price; }).filter(Boolean);
    var tps = fullMatched.map(function(s){ return s.take_profit; }).filter(Boolean);
    var sls = fullMatched.map(function(s){ return s.stop_loss; }).filter(Boolean);

    function zoneText(arr) {
        if (!arr.length) return { zone: '—', range: '' };
        var min = Math.min.apply(null, arr);
        var max = Math.max.apply(null, arr);
        if (arr.length === 1) return { zone: fmtPrice(min), range: '' };
        return { zone: fmtPrice(min) + ' – ' + fmtPrice(max), range: '(' + arr.length + '筆)' };
    }
    var entryInfo = zoneText(entries);
    var tpInfo = zoneText(tps);
    var slInfo = zoneText(sls);

    return {
        bias: bias, biasLabel: biasLabel, biasIcon: biasIcon,
        wr: wr, wrColor: wrColor,
        short: short, long: long, neutral: neutral, total: total,
        entryZone: entryInfo.zone, entryRange: entryInfo.range,
        tpZone: tpInfo.zone, tpRange: tpInfo.range,
        slZone: slInfo.zone, slRange: slInfo.range,
        hasFullMatched: fullMatched.length > 0
    };
}

function renderStrategyOverview(strategies) {
    if (!strategies || !strategies.length) return;
    window._consensusStrategies = strategies;
    var tfs = ['ALL'];
    strategies.forEach(function(s) { var tf = s.timeframe || 'UNKNOWN'; if (!tfs.includes(tf)) tfs.push(tf); });

        html += '<div class="cons-stat"><div class="cons-stat-label">止損</div><div class="cons-stat-value" style="color:var(--accent-red)">' + (sc.hasFullMatched ? sc.slZone : '—') + '</div><div class="cons-stat-sub">' + sc.slRange + '</div></div>';
        html += '</div></div>';
    });
    var body = document.getElementById('consensus-body');

var _rankStrategies = [];
var _allStrategies = [];
var _rankSortKey = 'win_rate';
var _rankSortAsc = false;
var _activePriceLines = {};

function renderRankingTable(strategies) {
    _rankStrategies = strategies || [];
    doRankSort();
}

function rankSetSort(key) {
    if (_rankSortKey === key) {
        _rankSortAsc = !_rankSortAsc;
    } else {
        _rankSortKey = key;
        _rankSortAsc = key === 'max_drawdown'; // lower is better for drawdown
    }
    // Update button states
    document.querySelectorAll('.rank-sort-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === key);
    });
    doRankSort();
}

function doRankSort() {
    var key = _rankSortKey;
    var asc = _rankSortAsc;
    var sorted = _rankStrategies.slice().sort(function(a, b) {
        var va = a[key], vb = b[key];
        if (typeof va === 'string') {
            return asc ? va.localeCompare(vb) : vb.localeCompare(va);
        }
        return asc ? (va || 0) - (vb || 0) : (vb || 0) - (va || 0);
    });
    var tbody = document.getElementById('rank-tbody');
    if (!tbody) return;
    if (!sorted.length) {
        tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:20px;color:var(--text-muted)">暫無策略</td></tr>';
        return;
    }
    var html = '';
    sorted.forEach(function(s, i) {
        var rank = i + 1;
        var rankClass = rank <= 3 ? 'rank-' + rank : '';
        var dir = s.direction || 'neutral';
        var badgeClass = dir === 'SHORT' ? 'short' : dir === 'LONG' ? 'long' : 'neutral';
        var dirIcon = dir === 'SHORT' ? '🔴' : dir === 'LONG' ? '🟢' : '⚪';
        var matchPct = s.match_pct || 0;
        var wr = s.win_rate || 0;
        var pf = s.profit_factor || 0;
        var dd = s.max_drawdown || 0;
        var sharpe = s.sharpe || 0;
        var matchClass = matchPct >= 80 ? 'high' : matchPct >= 50 ? 'mid' : 'low';
        var wrClass = wr >= 60 ? 'good' : wr >= 40 ? 'warn' : 'bad';
        var ddClass = dd <= 10 ? 'good' : dd <= 20 ? 'warn' : 'bad';
        var pfClass = pf >= 3 ? 'good' : pf >= 2 ? 'warn' : 'bad';
        var rowClass = rankClass + ' ' + (dir === 'LONG' ? 'row-long' : dir === 'SHORT' ? 'row-short' : '');

        html += '<tr class="' + rowClass + '" data-sid="' + s.strategy_id + '" title="點擊查看詳情">';
        html += '<td class="rank-num">' + rank + '</td>';
        html += '<td colspan="2"><div class="rank-name-cell"><div class="rank-name">' + (s.name || '?') + '</div><div class="rank-tf">' + (s.timeframe || '') + '</div></div></td>';
        html += '<td><span class="rank-badge ' + badgeClass + '">' + dirIcon + ' ' + dir + '</span></td>';
        html += '<td><span class="rank-conditions">' + (s.entry_conditions ? s.entry_conditions.slice(0,3).join('·') : '—') + '</span></td>';
        html += '<td><span class="rank-pct ' + matchClass + '">' + matchPct + '%</span></td>';
        html += '<td><span class="rank-metric ' + wrClass + '">' + wr.toFixed(1) + '%</span></td>';
        html += '<td><span class="rank-metric ' + pfClass + '">' + pf.toFixed(2) + '</span></td>';
        html += '<td><span class="rank-metric ' + ddClass + '">' + dd.toFixed(1) + '%</span></td>';
        html += '<td><span class="rank-metric ' + (sharpe >= 2 ? 'good' : sharpe >= 1 ? 'warn' : 'bad') + '">' + sharpe.toFixed(2) + '</span></td>';
        html += '<td><span class="rank-entry">' + (s.entry_conditions ? s.entry_conditions.length + ' 筆' : '—') + '</span></td>';
        html += '<td><span class="rank-entry">' + fmtPrice(s.entry_price) + '</span></td>';
        html += '</tr>';
    });
    tbody.innerHTML = html;
}

function _renderModalConditions(s) {
    var p = s.params || s.parameters || {};
    var dir = (s.direction || 'LONG').toUpperCase();
    var entryConditions = [];

    // Layer 1: from params.long / params.short
    var condObj = dir === 'SHORT' ? (p.short || p) : (p.long || p);
    if (condObj && typeof condObj === 'object') {
        for (var ck in condObj) {
            if (condObj[ck] === true) {
                var readable = ck.replace(/_/g, ' ').replace(/\b\w/g, function(l){ return l.toUpperCase(); });
                entryConditions.push(readable);
            }
        }
    }

    // Layer 2: from entry_conditions directly
    if (entryConditions.length === 0) {
        var ec = s.entry_conditions || s.conditions || [];
        if (typeof ec === 'string') ec = [ec];
        if (Array.isArray(ec) && ec.length > 0) {
            entryConditions = ec;
        }
    }

    if (entryConditions.length === 0) return '';

    var ind = window._currentIndicators || {};
    var rsi = ind.rsi || 50;
    var macd_bull = ind.macd_bull || false;
    var price_above_ma20 = ind.price_above_ma20 || false;
    var price_above_ma50 = ind.price_above_ma50 || false;
    var vol_ratio = ind.vol_ratio || 1;
    var momentum = ind.momentum_7d || 0;
    var evalCondition = function(cond) {
        if (!cond) return false;
        var lower = cond.toLowerCase();
        if (lower.includes('rsi') && lower.includes('<')) {
            var match = cond.match(/<?(\d+)/);
            if (match) return rsi < parseFloat(match[1]);
        }
        if (lower.includes('rsi') && lower.includes('>')) {
            var match = cond.match(/>?(\d+)/);
            if (match) return rsi > parseFloat(match[1]);
        }
        if (lower.includes('ma20') && lower.includes('above')) return price_above_ma20;
        if (lower.includes('ma50') && lower.includes('above')) return price_above_ma50;
        if (lower.includes('vol') && (lower.includes('>') || lower.includes('high') || lower.includes('up'))) return vol_ratio > 1.5;
        if (lower.includes('vol') && lower.includes('<')) return vol_ratio < 0.5;
        if (lower.includes('macd') && lower.includes('bull')) return macd_bull;
        if (lower.includes('momentum') && lower.includes('>')) return momentum > 0;
        if (lower.includes('momentum') && lower.includes('<')) return momentum < 0;
        return false;
    };
    var condHtml = '<div class="modal-section">';
    condHtml += '<div class="modal-section-title">進場條件</div>';
    entryConditions.forEach(function(cond) {
        var satisfied = evalCondition(cond);
        var color = satisfied ? '#3FB950' : '#555';
        var bg = satisfied ? 'rgba(63,185,80,0.1)' : 'rgba(50,50,50,0.3)';
        condHtml += '<div class="cond-item" style="background:' + bg + '">';
        condHtml += '<span style="color:' + color + ';font-size:16px">' + (satisfied ? '✅' : '⚪') + '</span>';
        condHtml += '<span style="color:' + (satisfied ? '#3FB950' : '#8B949E') + ';font-size:13px">' + cond + '</span>';
        condHtml += '</div>';
    });
    condHtml += '</div>';
    return condHtml;
}

// ── Load Strategies ──
function loadStrategies() {
    console.log('[DEBUG] loadStrategies called');
    Promise.all([
        fetch(API_BASE + '/strategies/live').then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); }),
        fetch(API_BASE + '/strategies/all').then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
    ])
    .then(function(results) {
        var liveData = results[0];
        var allData = results[1];
        var liveStrategies = liveData.strategies || [];
        var allStrategies = allData.strategies || [];
        // Prefer live metrics over stored metrics
        var liveMetrics = {};
        var allStrategiesMap = {};
        allStrategies.forEach(function(s) { allStrategiesMap[s.strategy_id] = s; });
        liveStrategies.forEach(function(s) { 
            liveMetrics[s.strategy_id] = s; 
            // Merge params from allStrategies if available
            if (allStrategiesMap[s.strategy_id] && allStrategiesMap[s.strategy_id].params) {
                s.params = allStrategiesMap[s.strategy_id].params;
            }
        });
        var combined = [];
        var seen = {};
        // First add all live strategies (with merged params)
        liveStrategies.forEach(function(s) {
            if (!seen[s.strategy_id]) {
                seen[s.strategy_id] = true;
                combined.push(s);
            }
        });
        // Then add experiment strategies that aren't in live
        allStrategies.forEach(function(s) {
            if (!seen[s.strategy_id] && (s.win_rate || 0) > 0) {
                seen[s.strategy_id] = true;
                combined.push(s);
            }
        });
        console.log('[DEBUG] live strategies:', liveStrategies.length, 'all strategies:', allStrategies.length, 'combined:', combined.length);
        window._allStrategies = combined;  // store complete list for openStrategyModalById
        renderStrategyOverview(combined);
        renderMarketSentiment(liveData.indicators || {});
        renderRankingTable(combined);
        var btcPrice = liveData.btc_price;
        var ind = liveData.indicators || {};
        window._currentIndicators = ind;
        lastSuccessfulUpdate = new Date();
        updateBadge('', '更新於 ' + formatTime(lastSuccessfulUpdate));
        renderMarketSentiment(ind);
        if (btcPrice) {
            var chartPriceEl = document.getElementById('chart-price');
            if (chartPriceEl) {
                chartPriceEl.textContent = fmtPrice(btcPrice);
                chartPriceEl.className = 'chart-price';
            }
        }
    })
    .catch(function(e) {
        console.error('[DEBUG] strategies fetch failed:', e);
        updateBadge('stale', '更新失敗');
    });
}

// ── Chart ──
function initChart() {
    var container = document.getElementById('chart-container');
    if (!container) return;
    if (chart) { chart.remove(); chart = null; }
    chart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: container.clientHeight,
        layout: {
            background: { color: '#161B22' },
            textColor: '#8B949E',
        },
        grid: {
            vertLines: { color: '#1C2128' },
            horzLines: { color: '#1C2128' },
        },
        crosshair: {
            mode: LightweightCharts.CrosshairMode.Normal,
        },
        rightPriceScale: {
            borderColor: '#30363D',
        },
        timeScale: {
            borderColor: '#30363D',
            timeVisible: true,
        },
    });
    candleSeries = chart.addCandlestickSeries({
        upColor: '#3FB950',
        downColor: '#F85149',
        borderUpColor: '#3FB950',
        borderDownColor: '#F85149',
        wickUpColor: '#3FB950',
        wickDownColor: '#F85149',
    });
    if (_chartResizeHandler) {
        window.removeEventListener('resize', _chartResizeHandler);
    }
    _chartResizeHandler = function() {
        if (chart && container) {
            chart.applyOptions({ width: container.clientWidth });
        }
    };
    window.addEventListener('resize', _chartResizeHandler);
}

function loadChartData(sym, tf) {
    sym = sym || currentSym;
    tf = tf || currentTF;

    var isTWSE = (currentMarket === 'TWSE');
    var url = isTWSE
        ? API_BASE + '/twse/klines/' + sym + '?interval=' + tf + '&limit=300'
        : API_BASE + '/klines?symbol=' + sym.toUpperCase().replace('USDT', '') + '&interval=' + tf + '&limit=300';

    fetch(url)
        .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
        .then(function(data) {
            if (!data || !data.length) return;
            var cdata = data.map(function(d) {
                return {
                    time: d.time,
                    open: parseFloat(d.open),
                    high: parseFloat(d.high),
                    low: parseFloat(d.low),
                    close: parseFloat(d.close)
                };
            });
            window._chartCandleData = cdata;  // store for MA/RSI overlay
            if (candleSeries) candleSeries.setData(cdata);
            if (chart) chart.timeScale().fitContent();

            if (isTWSE) {
                // Show TWSE stock code as symbol
                var sel = document.getElementById('twse-stock-select');
                var stockName = sym;
                if (sel) {
                    for (var i = 0; i < sel.options.length; i++) {
                        if (sel.options[i].value === sym) {
                            stockName = sel.options[i].textContent;
                            break;
                        }
                    }
                }
                var chartSymEl = document.getElementById('chart-sym');
                if (chartSymEl) chartSymEl.textContent = stockName;
            } else {
                var chartSymEl2 = document.getElementById('chart-sym');
                if (chartSymEl2) chartSymEl2.textContent = sym + '/USDT';
            }

            var last = cdata[cdata.length - 1];
            if (last) {
                var priceEl = document.getElementById('chart-price');
                if (priceEl) {
                    priceEl.textContent = fmtPrice(last.close);
                    priceEl.className = 'chart-price';
                    if (cdata.length > 1) {
                        var prev = cdata[cdata.length - 2];
                        if (prev) {
                            priceEl.className = 'chart-price ' + (last.close >= prev.close ? 'up' : 'dn');
                        }
                    }
                }
                var chgEl = document.getElementById('chart-change');
                if (chgEl && cdata.length > 1) {
                    var pct = ((last.close - cdata[0].close) / cdata[0].close * 100);
                    chgEl.textContent = fmtPct(pct);
                    chgEl.className = pct >= 0 ? 'up' : 'dn';
                }
            }
        })
        .catch(function(e) {
            console.error('chart error', e);
        });
}

// ── Tab Switching ──
function switchTab(tab) {
    // Hide all tab content
    document.querySelectorAll('.tab-content').forEach(function(el) { el.style.display = 'none'; });
    // Reset all tab buttons
    document.querySelectorAll('#tab-bar button, [id^="tab-btn-"]').forEach(function(el) {
        el.style.background = '';
        el.style.color = 'var(--text-muted)';
    });
    // Show selected tab content
    var tabEl = document.getElementById('tab-' + tab);
    if (tabEl) tabEl.style.display = 'block';
    // Highlight active tab button
    var btnEl = document.getElementById('tab-btn-' + tab);
    if (btnEl) { btnEl.style.background = '#333'; btnEl.style.color = '#fff'; }
}

    // Crypto TF buttons
    document.querySelectorAll('#crypto-tf-buttons .tf-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('#crypto-tf-buttons .tf-btn').forEach(function(b){ b.classList.remove('active'); });
            btn.classList.add('active');
            currentTF = btn.dataset.tf;
            loadChartData(currentSym, currentTF);
        });
    });

    // TWSE TF buttons
    document.querySelectorAll('#twse-tf-buttons .tf-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('#twse-tf-buttons .tf-btn').forEach(function(b){ b.classList.remove('active'); });
            btn.classList.add('active');
            var twseTf = btn.dataset.tf;
            loadTWSEChart(currentTWSEStock, twseTf);
        });
    });

    // Initialize on page load (wait for DOM ready)
    document.addEventListener('DOMContentLoaded', function() {
        switchMarket('CRYPTO');
        loadStrategies();
        loadAnomalies();
    });
    // Fallback: run immediately if DOM already loaded
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(function() {
            switchMarket('CRYPTO');
            loadStrategies();
            loadAnomalies();
        }, 10);
    }

    // Stale check with auto-retry
    setInterval(function() {
        if (lastSuccessfulUpdate) {
            var elapsed = Math.floor((Date.now() - lastSuccessfulUpdate.getTime()) / 1000);
            if (elapsed > 90) {
                updateBadge('stale', '逾期 ' + Math.floor(elapsed/60) + 'm');
                loadStrategies();
                loadAnomalies();
            }
        }
    }, 30000);

    // ESC key closes modal
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeStrategyModal();
    });

    // Document-level click listener for strategy table rows (fallback if inline onclick fails)
    document.addEventListener('click', function(e) {
        var tr = e.target.closest('tr[data-sid]');
        if (tr) {
            var id = tr.getAttribute('data-sid');
            if (id) openStrategyModalById(id);
        }
    });
</script>
