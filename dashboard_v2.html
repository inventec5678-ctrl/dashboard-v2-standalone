</head>
<body>

    <!-- Sidebar -->
    

    <!-- Main -->
    
        <div class="topbar">
            <div class="topbar-title" id="topbar-title">📈 加密貨幣量化交易平台</div>
            <div class="topbar-right">
                <div class="update-badge loading" id="update-badge">
                    <span class="dot"></span>
                    <span id="update-time">連接中...</span>
                </div>

                    <div id="last-update-time" style="font-size:10px;margin-top:2px">— —</div>
                </div>
                <div class="chart-tf" style="gap:2px;">
                    <!-- hamburger removed -->
                </div>
            </div>
        </div>

            <button id="tab-btn-us" class="tab-btn" onclick="switchMarket('US')">🇺🇸 美股</button>
            <button id="tab-btn-strategy" class="tab-btn" onclick="switchMarket('STRATEGY')">📊 策略</button>
                    </div>

        <div class="page">
            <!-- Crypto Tab (default visible) -->
            <div id="tab-crypto" class="tab-content">
                <div class="section">
                    <div class="section-title" id="tab-title-crypto">CRYPTO K 線</div>
                    <div class="chart-wrap">
                        <div class="chart-header">
                            <select id="symbol-select-crypto" class="sym-select" onchange="onSymbolChange('CRYPTO', this.value)">
                                <option value="">載入中...</option>
                            </select>
                            <span id="price-crypto" class="chart-price price-display">—</span>
                            <span id="change-crypto" class="change-display" style="font-size:11px;margin-left:6px;font-family:var(--font-mono)">—</span>
                            <span id="volume-crypto" style="font-size:10px;color:var(--text-muted);margin-left:6px">—</span>
                            <div class="chart-tf" id="tf-crypto">
                                <button class="tf-btn" data-tf="15m" data-market="CRYPTO">15分</button>
                                <button class="tf-btn" data-tf="1h" data-market="CRYPTO">1時</button>
                                <button class="tf-btn" data-tf="4h" data-market="CRYPTO">4時</button>
                                <button class="tf-btn active" data-tf="D" data-market="CRYPTO">日</button>
                                <button class="tf-btn" data-tf="W" data-market="CRYPTO">週</button>
                                <button class="tf-btn" data-tf="M" data-market="CRYPTO">月</button>
                            </div>
                        </div>
                        <div id="chart-crypto" class="chart-main"></div>
                        <div id="chart-crypto-vol" class="chart-vol"></div>
                    </div>
                </div>
            </div>



            <!-- TWSE Tab Content -->
            <div id="tab-twse" class="tab-content" style="display:none;">
                <div class="section">
                    <div class="section-title" id="tab-title-twse">TWSE K 線</div>
                    <div class="chart-wrap">
                        <div class="chart-header">
                            <select id="symbol-select-twse" class="sym-select" onchange="onSymbolChange('TWSE', this.value)">
                                <option value="">載入中...</option>
                            </select>
                            <span id="price-twse" class="chart-price price-display">—</span>
                            <span id="change-twse" class="change-display" style="font-size:11px;margin-left:6px;font-family:var(--font-mono)">—</span>
                            <span id="volume-twse" style="font-size:10px;color:var(--text-muted);margin-left:6px">—</span>
                            <div class="chart-tf" id="tf-twse">
                                <button class="tf-btn active" data-tf="D" data-market="TWSE">日</button>
                                <button class="tf-btn" data-tf="W" data-market="TWSE">週</button>
                                <button class="tf-btn" data-tf="M" data-market="TWSE">月</button>
                            </div>
                        </div>
                        <div id="chart-twse" class="chart-main"></div>
                        <div id="chart-twse-vol" class="chart-vol"></div>
                    </div>
                </div>
            </div>



            <!-- US Tab Content -->
            <div id="tab-us" class="tab-content" style="display:none;">
                <div class="section">
                    <div class="section-title" id="tab-title-us">US K 線</div>
                    <div class="chart-wrap">
                        <div class="chart-header">
                            <select id="symbol-select-us" class="sym-select" onchange="onSymbolChange('US', this.value)">
                                <option value="">載入中...</option>
                            </select>
                            <span id="price-us" class="chart-price price-display">—</span>
                            <span id="change-us" class="change-display" style="font-size:11px;margin-left:6px;font-family:var(--font-mono)">—</span>
                            <span id="volume-us" style="font-size:10px;color:var(--text-muted);margin-left:6px">—</span>
                            <div class="chart-tf" id="tf-us">
                                <button class="tf-btn active" data-tf="D" data-market="US">日</button>
                                <button class="tf-btn" data-tf="W" data-market="US">週</button>
                                <button class="tf-btn" data-tf="M" data-market="US">月</button>
                            </div>
                        </div>
                        <div id="chart-us" class="chart-main"></div>
                        <div id="chart-us-vol" class="chart-vol"></div>
                    </div>
                </div>
            </div>


            <!-- Strategy Tab Content -->
            <div id="tab-strategy" class="tab-content" style="display:none;">

                <!-- Market Sentiment -->
                <div class="section">
                    <div class="section-title">市場情緒</div>
                    <div class="sentiment-bar" id="sentiment-bar">
                        <div class="sentiment-chip neutral" id="sc-rsi"><span class="chip-label">RSI 14</span><span class="chip-val" id="sc-rsi-val">—</span></div>
                        <div class="sentiment-chip neutral" id="sc-rsi4h"><span class="chip-label">RSI 4H</span><span class="chip-val" id="sc-rsi4h-val">—</span></div>
                        <div class="sentiment-chip neutral" id="sc-ma20"><span class="chip-label">MA20</span><span class="chip-val" id="sc-ma20-val">—</span></div>
                        <div class="sentiment-chip neutral" id="sc-ma50"><span class="chip-label">MA50</span><span class="chip-val" id="sc-ma50-val">—</span></div>
                        <div class="sentiment-chip neutral" id="sc-ma200"><span class="chip-label">MA200</span><span class="chip-val" id="sc-ma200-val">—</span></div>
                        <div class="sentiment-chip neutral" id="sc-regime"><span class="regime-dot" id="sc-regime-dot"></span><span class="chip-label">市場結構</span><span class="chip-val" id="sc-regime-val">—</span></div>

                        <div class="sentiment-chip neutral" id="sc-cross"><span class="chip-label">交叉信號</span><span class="chip-val" id="sc-cross-val">—</span></div>
                    </div>
                </div>

                <!-- Strategy Overview -->
                <div class="section">
                    <div class="section-title">策略概覽</div>
                    <div class="consensus-wrap">
                        <div class="cons-body is-contents" id="strategy-consensus-body">

                        </div>
                    </div>
                </div>

                <!-- Strategy Ranking -->
                <div class="section">
                    <div class="section-title">策略排行</div>
                    <div class="rank-panel">
                        <div class="rank-toolbar" id="strategy-rank-toolbar">
                            <span style="font-size:12px;color:var(--text-muted);margin-right:8px">排序：</span>
                            <button class="rank-sort-btn active" data-sort="win_rate" onclick="rankSetSort('win_rate')">勝率</button>
                            <button class="rank-sort-btn" data-sort="profit_factor" onclick="rankSetSort('profit_factor')">盈虧比</button>
                            <button class="rank-sort-btn" data-sort="max_drawdown" onclick="rankSetSort('max_drawdown')">最大回撤</button>
                            <button class="rank-sort-btn" data-sort="sharpe" onclick="rankSetSort('sharpe')">Sharpe</button>
                            <button class="rank-sort-btn" data-sort="match_pct" onclick="rankSetSort('match_pct')">信心度</button>
                        </div>
                        <div class="rank-table-wrap">
                            <table class="rank-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>策略名稱</th>
                                        <th>時間軸</th>
                                        <th>方向</th>
                                        <th class="sortable" data-sort="match_pct">信心度 ↕</th>
                                        <th class="sortable" data-sort="win_rate">勝率 ↕</th>
                                        <th class="sortable" data-sort="profit_factor">盈虧比 ↕</th>
                                        <th class="sortable" data-sort="max_drawdown">最大回撤 ↕</th>
                                        <th class="sortable" data-sort="sharpe">Sharpe ↕</th>

                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div><!-- /tab-strategy -->

        </div>
</div>

<!-- Strategy Detail Modal -->

    <div class="modal-box">
        <div class="modal-header">
            <div class="modal-title" id="modal-title">策略詳情</div>

        <div class="modal-body" id="modal-body"></div>

<!-- TradingView Lightweight Charts -->
<script>window.API_BASE = '/api';</script>
<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>

<script>
function clearPriceLines() {
    if (window._priceLines) {
        window._priceLines.forEach(function(line) {
            if (line && typeof line.remove === 'function') line.remove();
        });
        window._priceLines = [];
    }
    // Also remove MA/RSI overlay series
    if (window._maLineSeries) { window._maLineSeries.remove(); window._maLineSeries = null; }
    if (window._rsiLineSeries) { window._rsiLineSeries.remove(); window._rsiLineSeries = null; }
    window._activePriceLines = {};
    // Hide clear button if no price lines remain
    var clearBtn = document.getElementById('clear-chart-lines-btn');
    if (clearBtn) clearBtn.style.display = 'none';
}

function togglePriceLine(type) {
    var s = window._activeModalStrategy || window._currentStrategy;
    if (!s) return;
    // Clear previous lines of this type
    if (window._priceLines) {
        window._priceLines.forEach(function(line) {
            if (line && typeof line.remove === 'function') line.remove();
        });
        window._priceLines = [];
    }
    window._priceLines = [];

    var color, title;
    var price = null;

    if (type === 'entry') {
        price = s.entry_price;
        color = '#58A6FF';
        title = '📍 Entry';
    } else if (type === 'tp') {
        price = s.take_profit;
        color = '#3FB950';
        title = '🎯 TP';
    } else if (type === 'sl') {
        price = s.stop_loss;
        color = '#F85149';
        title = '🛡 SL';
    } else if (type === 'ma') {
        // MA overlay: compute from close prices
        var period = (s.parameters && (s.parameters.ma_period || s.parameters.ma_slow)) || 20;
        title = 'MA' + period;
        color = '#D29922';
        if (candleSeries && window._chartCandleData) {
            var closes = window._chartCandleData.map(function(d) { return d.close; });
            if (closes.length >= period) {
                var maData = [];
                for (var i = period - 1; i < closes.length; i++) {
                    var sum = 0;
                    for (var j = 0; j < period; j++) sum += closes[i - j];
                    maData.push({ time: window._chartCandleData[i].time, value: sum / period });
                }
                if (window._maLineSeries) {
                    window._maLineSeries.remove();
                    window._maLineSeries = null;
                }
                window._maLineSeries = chart.addLineSeries({
                    color: color,
                    lineWidth: 2,
                    priceLineVisible: false,
                    lastValueVisible: true,
                    title: title,
                });
                window._maLineSeries.setData(maData);
                window._priceLines.push(window._maLineSeries);
                window._activePriceLines['ma'] = title;
                if (chart) chart.timeScale().fitContent();
                var clearBtn = document.getElementById('clear-chart-lines-btn');
                if (clearBtn) clearBtn.style.display = 'inline';
                return;
            }
        }

        return;
    } else if (type === 'rsi') {
        // RSI overlay: compute from close prices
        title = 'RSI14';
        color = '#A371F7';
        if (candleSeries && window._chartCandleData) {
            var closes = window._chartCandleData.map(function(d) { return d.close; });
            if (closes.length >= 14) {
                var rsiData = [];
                var gains = [], losses = [];
                for (var i = 1; i < closes.length; i++) {
                    var diff = closes[i] - closes[i-1];
                    gains.push(diff > 0 ? diff : 0);
                    losses.push(diff < 0 ? -diff : 0);
                }
                for (var i = 13; i < gains.length; i++) {
                    var avgGain = 0, avgLoss = 0;
                    for (var j = i-13; j <= i; j++) { avgGain += gains[j]; avgLoss += losses[j]; }
                    avgGain /= 14; avgLoss /= 14;
                    var rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
                    var rsiVal = 100 - (100 / (1 + rs));
                    rsiData.push({ time: window._chartCandleData[i+1].time, value: rsiVal });
                }
                if (window._rsiLineSeries) {
                    window._rsiLineSeries.remove();
                    window._rsiLineSeries = null;
                }
                // RSI needs its own pane — create price line markers as approximation
                window._rsiLineSeries = chart.addLineSeries({
                    color: color,
                    lineWidth: 2,
                    priceLineVisible: false,
                    lastValueVisible: true,
                    title: title,
                });
                window._rsiLineSeries.setData(rsiData);
                window._priceLines.push(window._rsiLineSeries);
                window._activePriceLines['rsi'] = title;
                if (chart) chart.timeScale().fitContent();
                var clearBtn = document.getElementById('clear-chart-lines-btn');
                if (clearBtn) clearBtn.style.display = 'inline';
                return;
            }
        }

        return;
    } else {
        return;
    }

    if (!price) {
        return;
    }

    // Draw horizontal price line on main chart
    if (candleSeries) {
        var lineStyle = LightweightCharts.LineStyle.Dashed;
        var line = candleSeries.createPriceLine({
            price: price,
            color: color,
            lineWidth: 1,
            lineStyle: lineStyle,
            axisLabelVisible: true,
            title: title
        });
        window._priceLines.push(line);
        window._activePriceLines[type] = price;
    }

    // Show clear button
    var clearBtn = document.getElementById('clear-chart-lines-btn');
    if (clearBtn) clearBtn.style.display = 'inline';

    if (chart) chart.timeScale().fitContent();
}
</script>

<script type="module" src="/static/js/dashboard.js?v=13"></script>
</body>

</html>
