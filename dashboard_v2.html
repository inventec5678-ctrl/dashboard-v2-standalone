<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>

<script>
function clearPriceLines() {
    if (window._priceLines) {
        window._priceLines.forEach(function(line) {
            if (line && typeof line.remove === 'function') line.remove();
        });
        window._priceLines = [];
    }
    // Also remove MA/RSI overlay series
    if (window._maLineSeries) { window._maLineSeries.remove(); window._maLineSeries = null; }
    if (window._rsiLineSeries) { window._rsiLineSeries.remove(); window._rsiLineSeries = null; }
    window._activePriceLines = {};
    // Hide clear button if no price lines remain
    var clearBtn = document.getElementById('clear-chart-lines-btn');
    if (clearBtn) clearBtn.style.display = 'none';
}

function togglePriceLine(type) {
    var s = window._activeModalStrategy || window._currentStrategy;
    if (!s) return;
    // Clear previous lines of this type
    if (window._priceLines) {
        window._priceLines.forEach(function(line) {
            if (line && typeof line.remove === 'function') line.remove();
        });
        window._priceLines = [];
    }
    window._priceLines = [];

    var color, title;
    var price = null;

    if (type === 'entry') {
        price = s.entry_price;
        color = '#58A6FF';
        title = '📍 Entry';
    } else if (type === 'tp') {
        price = s.take_profit;
        color = '#3FB950';
        title = '🎯 TP';
    } else if (type === 'sl') {
        price = s.stop_loss;
        color = '#F85149';
        title = '🛡 SL';
    } else if (type === 'ma') {
        // MA overlay: compute from close prices
        var period = (s.parameters && (s.parameters.ma_period || s.parameters.ma_slow)) || 20;
        title = 'MA' + period;
        color = '#D29922';
        if (candleSeries && window._chartCandleData) {
            var closes = window._chartCandleData.map(function(d) { return d.close; });
            if (closes.length >= period) {
                var maData = [];
                for (var i = period - 1; i < closes.length; i++) {
                    var sum = 0;
                    for (var j = 0; j < period; j++) sum += closes[i - j];
                    maData.push({ time: window._chartCandleData[i].time, value: sum / period });
                }
                if (window._maLineSeries) {
                    window._maLineSeries.remove();
                    window._maLineSeries = null;
                }
                window._maLineSeries = chart.addLineSeries({
                    color: color,
                    lineWidth: 2,
                    priceLineVisible: false,
                    lastValueVisible: true,
                    title: title,
                });
                window._maLineSeries.setData(maData);
                window._priceLines.push(window._maLineSeries);
                window._activePriceLines['ma'] = title;
                if (chart) chart.timeScale().fitContent();
                var clearBtn = document.getElementById('clear-chart-lines-btn');
                if (clearBtn) clearBtn.style.display = 'inline';
                return;
            }
        }

        return;
    } else if (type === 'rsi') {
        // RSI overlay: compute from close prices
        title = 'RSI14';
        color = '#A371F7';
        if (candleSeries && window._chartCandleData) {
            var closes = window._chartCandleData.map(function(d) { return d.close; });
            if (closes.length >= 14) {
                var rsiData = [];
                var gains = [], losses = [];
                for (var i = 1; i < closes.length; i++) {
                    var diff = closes[i] - closes[i-1];
                    gains.push(diff > 0 ? diff : 0);
                    losses.push(diff < 0 ? -diff : 0);
                }
                for (var i = 13; i < gains.length; i++) {
                    var avgGain = 0, avgLoss = 0;
                    for (var j = i-13; j <= i; j++) { avgGain += gains[j]; avgLoss += losses[j]; }
                    avgGain /= 14; avgLoss /= 14;
                    var rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
                    var rsiVal = 100 - (100 / (1 + rs));
                    rsiData.push({ time: window._chartCandleData[i+1].time, value: rsiVal });
                }
                if (window._rsiLineSeries) {
                    window._rsiLineSeries.remove();
                    window._rsiLineSeries = null;
                }
                // RSI needs its own pane — create price line markers as approximation
                window._rsiLineSeries = chart.addLineSeries({
                    color: color,
                    lineWidth: 2,
                    priceLineVisible: false,
                    lastValueVisible: true,
                    title: title,
                });
                window._rsiLineSeries.setData(rsiData);
                window._priceLines.push(window._rsiLineSeries);
                window._activePriceLines['rsi'] = title;
                if (chart) chart.timeScale().fitContent();
                var clearBtn = document.getElementById('clear-chart-lines-btn');
                if (clearBtn) clearBtn.style.display = 'inline';
                return;
            }
        }

        return;
    } else {
        return;
    }

    if (!price) {
        return;
    }

    // Draw horizontal price line on main chart
    if (candleSeries) {
        var lineStyle = LightweightCharts.LineStyle.Dashed;
        var line = candleSeries.createPriceLine({
            price: price,
            color: color,
            lineWidth: 1,
            lineStyle: lineStyle,
            axisLabelVisible: true,
            title: title
        });
        window._priceLines.push(line);
        window._activePriceLines[type] = price;
    }

    // Show clear button
    var clearBtn = document.getElementById('clear-chart-lines-btn');
    if (clearBtn) clearBtn.style.display = 'inline';

    if (chart) chart.timeScale().fitContent();
}
</script>
